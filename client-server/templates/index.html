<!DOCTYPE html>
<html>
<head>
    <title>Mask Detector</title>
</head>
<body>
    <h1>Mask Detection</h1>
    <video id="video" width="320" height="240" autoplay></video>
    <br><br>
    <button id="btn" onclick="capture()">Capture &amp; Predict</button>
    <canvas id="canvas" width="320" height="240" style="display:none;"></canvas>
    <h2 id="result">Press the button to start</h2>

    <script>
        const video  = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const result = document.getElementById('result');
        const btn    = document.getElementById('btn');

        navigator.mediaDevices.getUserMedia({ video: true })
            .then(function(stream) { video.srcObject = stream; })
            .catch(function(err)   { result.textContent = 'Camera error: ' + err; });

        function capture() {
            btn.disabled = true;
            result.textContent = 'Processing...';

            var ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, 320, 240);
            var dataUrl = canvas.toDataURL('image/jpeg', 0.8);
            var base64  = dataUrl.split(',')[1];

            fetch('/predict', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ image: base64 })
            })
            .then(function(res) { return res.json(); })
            .then(function(data) {
                if (data.error) {
                    result.textContent = 'Error: ' + data.error;
                } else {
                    var pct = (data.confidence * 100).toFixed(1);
                    result.textContent = data.prediction + ' (' + pct + '% confidence)';
                }
                btn.disabled = false;
            })
            .catch(function(err) {
                result.textContent = 'Request failed: ' + err;
                btn.disabled = false;
            });
        }
    </script>
</body>
</html>
