name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:
  build-and-push:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push client-server
        uses: docker/build-push-action@v5
        with:
          context: ./client-server
          push: true
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/mask-client:latest
            ${{ env.DOCKERHUB_USERNAME }}/mask-client:${{ github.sha }}

      - name: Build and push model-server
        uses: docker/build-push-action@v5
        with:
          context: ./model-server
          push: true
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/mask-model:latest
            ${{ env.DOCKERHUB_USERNAME }}/mask-model:${{ github.sha }}

      - name: Build and push db-server
        uses: docker/build-push-action@v5
        with:
          context: ./db-server
          push: true
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/mask-db:latest
            ${{ env.DOCKERHUB_USERNAME }}/mask-db:${{ github.sha }}